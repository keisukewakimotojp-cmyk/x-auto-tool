<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Auto Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #4361EE;
      --blue-dark:   #3451d1;
      --blue-light:  #EEF2FF;
      --blue-mid:    #c7d2fe;
      --green:       #22C55E;
      --red:         #EF4444;
      --bg:          linear-gradient(145deg, #e8edf8 0%, #dff0ec 100%);
      --sidebar-w:   230px;
      --card:        #ffffff;
      --border:      #e2e8f0;
      --text:        #1e293b;
      --muted:       #64748b;
      --shadow-sm:   0 1px 6px rgba(67,97,238,.07);
      --shadow:      0 2px 12px rgba(67,97,238,.10);
      --radius:      14px;
      --radius-sm:   8px;
    }

    body {
      font-family: "Inter", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: 22px 20px 18px;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .logo-icon {
      width: 28px; height: 28px;
      background: var(--blue);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sidebar-logo .logo-icon svg { width: 16px; height: 16px; fill: #fff; }

    .sidebar-section {
      padding: 16px 12px 0;
    }
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .7px;
      padding: 0 8px;
      margin-bottom: 6px;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 5px;
      padding: 0 4px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .form-row { margin-bottom: 12px; }

    select, input[type="url"], input[type="number"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    select:focus, input:focus { border-color: var(--blue); }

    /* Topic pills */
    .topic-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .topic-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      background: #fff;
      color: var(--muted);
      transition: all .15s;
      user-select: none;
      white-space: nowrap;
    }
    .topic-pill:hover { border-color: var(--blue); color: var(--blue); }
    .topic-pill.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .topic-pill input { display: none; }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(.97); }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      width: 100%;
    }
    .btn-primary:hover:not(:disabled) { background: var(--blue-dark); }

    .btn-outline {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 16px;
    }
    .btn-outline:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

    .btn-ghost {
      background: var(--blue-light);
      color: var(--blue);
      border: 1px solid var(--blue-mid);
      padding: 8px 16px;
    }
    .btn-ghost:hover:not(:disabled) { background: #e0e7ff; }

    .btn-dark {
      background: var(--text);
      color: #fff;
      padding: 9px 22px;
    }
    .btn-dark:hover:not(:disabled) { background: #334155; }

    .loader {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    .btn-ghost .loader { border-color: rgba(67,97,238,.3); border-top-color: var(--blue); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .main-header {
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
    }
    .main-header h1 { font-size: 20px; font-weight: 700; }
    .main-header .subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .main-content {
      flex: 1;
      padding: 0 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--card);
      border: 1px solid rgba(226,232,240,.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }
    .card-header {
      padding: 18px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h2 { font-size: 15px; font-weight: 700; }
    .card-body { padding: 16px 20px 20px; }

    .count-badge {
      font-size: 11px;
      font-weight: 700;
      background: var(--blue-light);
      color: var(--blue);
      border-radius: 999px;
      padding: 3px 10px;
    }

    /* ===== TRENDS ===== */
    .select-all-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .select-all-row label {
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    input[type="checkbox"] { accent-color: var(--blue); cursor: pointer; }

    .trend-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all .15s;
    }
    .trend-card:last-child { margin-bottom: 0; }
    .trend-card:hover { border-color: var(--blue-mid); background: var(--blue-light); }
    .trend-card.selected { border-color: var(--blue); background: var(--blue-light); }
    .trend-card input[type="checkbox"] { margin-top: 3px; flex-shrink: 0; }
    .trend-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; line-height: 1.4; }
    .trend-title a { color: var(--text); text-decoration: none; }
    .trend-title a:hover { color: var(--blue); }
    .trend-summary {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ===== TWEET SECTION ===== */
    .tweet-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .module-notice { font-size: 11px; color: var(--red); }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--blue); }

    .char-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    #char-count { font-size: 12px; color: var(--muted); }
    #char-count.over { color: var(--red); font-weight: 700; }

    /* ===== STATUS ===== */
    .status {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
    }
    .status.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.error   { background: #fff1f2; color: #991b1b; border: 1px solid #fecaca; }
    .status.info    { background: var(--blue-light); color: #1e40af; border: 1px solid var(--blue-mid); }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
    }
    .empty-icon {
      width: 56px; height: 56px;
      background: var(--blue-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .empty-icon svg { width: 26px; height: 26px; stroke: var(--blue); }
    .empty-state p { font-size: 13px; }

    @media (max-width: 640px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; min-height: auto; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
      .main-content { padding: 0 16px 20px; }
      .main-header { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    </div>
    X Auto Tool
  </div>

  <!-- ソース設定 -->
  <div class="sidebar-section">
    <div class="sidebar-section-label">データソース</div>

    <div class="form-row">
      <label class="field-label">ソースを選択</label>
      <select id="source-preset">
        {% set current_group = namespace(name="") %}
        {% for s in preset_sources %}
          {% if s.group != current_group.name %}
            {% if current_group.name != "" %}</optgroup>{% endif %}
            <optgroup label="{{ s.group }}">
            {% set current_group.name = s.group %}
          {% endif %}
          <option value="{{ s.url }}" data-id="{{ s.id }}">{{ s.label }}</option>
        {% endfor %}
        </optgroup>
      </select>
    </div>

    <div class="form-row" id="custom-url-group" style="display:none">
      <label class="field-label">カスタム RSS URL</label>
      <input type="url" id="custom-url" placeholder="https://...">
    </div>

    <div class="form-row">
      <label class="field-label">取得件数</label>
      <input type="number" id="max-items" value="10" min="1" max="50">
    </div>
  </div>

  <!-- トピックフィルター -->
  <div class="sidebar-section" style="margin-top: 12px;">
    <div class="sidebar-section-label">トピックフィルター</div>
    <div class="topic-grid" id="topic-grid">
      <!-- JS で生成 -->
    </div>
  </div>

  <!-- 取得ボタン -->
  <div class="sidebar-footer">
    <button class="btn btn-primary" id="fetch-btn" onclick="fetchTrends()">
      <span id="fetch-label">トレンドを取得</span>
      <span class="loader" id="fetch-loader"></span>
    </button>
    <div class="status" id="fetch-status"></div>
  </div>
</aside>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="main-header">
    <div>
      <h1>トレンド取得・ツイート生成</h1>
      <div class="subtitle">取得したトレンドをもとに AI がツイートを生成します</div>
    </div>
  </div>

  <div class="main-content">

    <!-- トレンド一覧カード -->
    <div class="card">
      <div class="card-header">
        <h2>トレンド</h2>
        <span class="count-badge" id="count-badge" style="display:none"></span>
      </div>
      <div class="card-body">
        <div class="select-all-row" id="select-all-row">
          <label>
            <input type="checkbox" id="select-all" onchange="toggleSelectAll(this)">
            すべて選択
          </label>
        </div>
        <div id="trends-list">
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
                <path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/>
              </svg>
            </div>
            <p>左のパネルでソースとトピックを選んで「トレンドを取得」を押してください</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ツイート生成・投稿カード -->
    <div class="card" id="tweet-section" style="display:none">
      <div class="card-header">
        <h2>ツイート生成・投稿</h2>
      </div>
      <div class="card-body">
        <div class="tweet-actions">
          <button
            class="btn btn-ghost"
            id="generate-btn"
            onclick="generateTweet()"
            {% if not has_content_generator %}disabled{% endif %}
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313-12.454z"/><path d="M17 4a2 2 0 0 0 2 2a2 2 0 0 0 -2 2a2 2 0 0 0 -2-2a2 2 0 0 0 2-2"/><path d="M19 11h2m-1-1v2"/></svg>
            <span id="gen-label">AI でツイートを生成</span>
            <span class="loader" id="gen-loader"></span>
          </button>
          {% if not has_content_generator %}
          <span class="module-notice">content_generator.py が未実装</span>
          {% endif %}
        </div>

        <textarea
          id="tweet-text"
          placeholder="トレンドを選択して「AI でツイートを生成」を押すか、ここに直接入力してください。"
          oninput="updateCharCount()"
          maxlength="280"
        ></textarea>

        <div class="char-row">
          <span id="char-count">0 / 280</span>
          <button
            class="btn btn-dark"
            id="post-btn"
            onclick="postTweet()"
            {% if not has_x_poster %}disabled{% endif %}
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            <span id="post-label">X に投稿</span>
            <span class="loader" id="post-loader"></span>
          </button>
        </div>

        {% if not has_x_poster %}
        <p class="module-notice" style="margin-top:6px;">x_poster.py が未実装のため投稿は無効</p>
        {% endif %}

        <div class="status" id="tweet-status"></div>
      </div>
    </div>

  </div>
</div>

<script>
  // ===== トピック定義 =====
  const TOPICS = [
    { id: "ai",            label: "AI",          keywords: ["AI", "機械学習", "ChatGPT", "LLM", "artificial intelligence", "generative"] },
    { id: "tech",          label: "テック",        keywords: ["tech", "テクノロジー", "technology", "テック", "software"] },
    { id: "startup",       label: "スタートアップ", keywords: ["startup", "スタートアップ", "VC", "venture", "funding", "資金調達"] },
    { id: "business",      label: "ビジネス",      keywords: ["business", "ビジネス", "経営", "企業"] },
    { id: "finance",       label: "経済",          keywords: ["finance", "経済", "金融", "投資", "株", "market"] },
    { id: "crypto",        label: "暗号通貨",      keywords: ["crypto", "暗号通貨", "bitcoin", "blockchain", "NFT", "web3"] },
    { id: "design",        label: "デザイン",      keywords: ["design", "デザイン", "UX", "UI"] },
    { id: "science",       label: "サイエンス",    keywords: ["science", "科学", "research", "研究"] },
    { id: "entertainment", label: "エンタメ",      keywords: ["entertainment", "エンタメ", "映画", "音楽", "ゲーム", "anime"] },
    { id: "sports",        label: "スポーツ",      keywords: ["sports", "スポーツ", "football", "baseball", "野球", "サッカー"] },
  ];

  // トピックピル生成
  const grid = document.getElementById("topic-grid");
  TOPICS.forEach(topic => {
    const lbl = document.createElement("label");
    lbl.className = "topic-pill";
    lbl.dataset.id = topic.id;
    lbl.innerHTML = `<input type="checkbox" value="${topic.id}">${topic.label}`;
    lbl.querySelector("input").addEventListener("change", e => {
      lbl.classList.toggle("active", e.target.checked);
    });
    grid.appendChild(lbl);
  });

  // ===== ソース =====
  const sourceSelect = document.getElementById("source-preset");
  sourceSelect.addEventListener("change", () => {
    const isCustom = sourceSelect.options[sourceSelect.selectedIndex].dataset.id === "custom";
    document.getElementById("custom-url-group").style.display = isCustom ? "block" : "none";
  });

  function getSourceUrl() {
    const opt = sourceSelect.options[sourceSelect.selectedIndex];
    return opt.dataset.id === "custom"
      ? document.getElementById("custom-url").value.trim()
      : opt.value;
  }

  function getSelectedKeywords() {
    const keywords = [];
    document.querySelectorAll("#topic-grid input:checked").forEach(chk => {
      const t = TOPICS.find(x => x.id === chk.value);
      if (t) keywords.push(...t.keywords);
    });
    return keywords;
  }

  // ===== トレンド取得 =====
  let allTrends = [];

  async function fetchTrends() {
    const sourceUrl = getSourceUrl();
    if (!sourceUrl) { showStatus("fetch-status", "error", "RSS URL を入力してください。"); return; }

    const topics = getSelectedKeywords();
    const maxItems = parseInt(document.getElementById("max-items").value, 10);

    setLoading("fetch-btn", "fetch-label", "fetch-loader", true);
    hideStatus("fetch-status");

    try {
      const res = await fetch("/api/trends", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ source_url: sourceUrl, topics: topics.length ? topics : null, max_items: maxItems }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "取得に失敗しました");
      allTrends = data.trends;
      renderTrends(allTrends);
      if (!allTrends.length) showStatus("fetch-status", "info", "条件に一致する記事が見つかりませんでした。");
    } catch (e) {
      showStatus("fetch-status", "error", e.message);
    } finally {
      setLoading("fetch-btn", "fetch-label", "fetch-loader", false);
    }
  }

  function renderTrends(trends) {
    const list = document.getElementById("trends-list");
    const badge = document.getElementById("count-badge");
    const saRow = document.getElementById("select-all-row");

    if (!trends.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><p>記事が見つかりませんでした</p></div>`;
      badge.style.display = "none"; saRow.style.display = "none"; return;
    }

    badge.textContent = `${trends.length} 件`;
    badge.style.display = "inline";
    saRow.style.display = "flex";
    document.getElementById("tweet-section").style.display = "block";
    document.getElementById("select-all").checked = false;

    list.innerHTML = trends.map((t, i) => `
      <div class="trend-card" id="card-${i}" onclick="toggleCard(${i})">
        <input type="checkbox" id="chk-${i}" onchange="onCheckChange()" onclick="event.stopPropagation()">
        <div style="min-width:0">
          <div class="trend-title">
            <a href="${escHtml(t.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escHtml(t.title)}</a>
          </div>
          ${t.summary ? `<div class="trend-summary">${escHtml(t.summary)}</div>` : ""}
        </div>
      </div>`).join("");
  }

  function toggleCard(i) {
    const c = document.getElementById(`chk-${i}`);
    c.checked = !c.checked; onCheckChange();
  }
  function onCheckChange() {
    allTrends.forEach((_, i) => {
      const c = document.getElementById(`chk-${i}`);
      document.getElementById(`card-${i}`)?.classList.toggle("selected", !!c?.checked);
    });
    const sel = getSelectedTrends().length;
    document.getElementById("select-all").checked = sel === allTrends.length && allTrends.length > 0;
  }
  function toggleSelectAll(el) {
    allTrends.forEach((_, i) => { const c = document.getElementById(`chk-${i}`); if (c) c.checked = el.checked; });
    onCheckChange();
  }
  function getSelectedTrends() {
    return allTrends.filter((_, i) => document.getElementById(`chk-${i}`)?.checked);
  }

  // ===== ツイート生成 =====
  async function generateTweet() {
    const sel = getSelectedTrends();
    if (!sel.length) { showStatus("tweet-status", "error", "トレンドを1件以上選択してください。"); return; }
    setLoading("generate-btn", "gen-label", "gen-loader", true);
    hideStatus("tweet-status");
    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ trends: sel }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "生成に失敗しました");
      document.getElementById("tweet-text").value = data.tweet;
      updateCharCount();
    } catch (e) {
      showStatus("tweet-status", "error", e.message);
    } finally {
      setLoading("generate-btn", "gen-label", "gen-loader", false);
    }
  }

  // ===== 投稿 =====
  async function postTweet() {
    const tweet = document.getElementById("tweet-text").value.trim();
    if (!tweet) { showStatus("tweet-status", "error", "ツイート内容を入力してください。"); return; }
    if (tweet.length > 280) { showStatus("tweet-status", "error", "280文字以内にしてください。"); return; }
    if (!confirm("この内容で X に投稿しますか？")) return;
    setLoading("post-btn", "post-label", "post-loader", true);
    hideStatus("tweet-status");
    try {
      const res = await fetch("/api/post", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tweet }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "投稿に失敗しました");
      showStatus("tweet-status", "success", "投稿が完了しました！");
      document.getElementById("tweet-text").value = "";
      updateCharCount();
    } catch (e) {
      showStatus("tweet-status", "error", e.message);
    } finally {
      setLoading("post-btn", "post-label", "post-loader", false);
    }
  }

  // ===== ユーティリティ =====
  function updateCharCount() {
    const len = document.getElementById("tweet-text").value.length;
    const el = document.getElementById("char-count");
    el.textContent = `${len} / 280`;
    el.classList.toggle("over", len > 280);
  }
  function setLoading(btnId, labelId, loaderId, on) {
    document.getElementById(btnId).disabled = on;
    document.getElementById(labelId).style.display = on ? "none" : "";
    document.getElementById(loaderId).style.display = on ? "inline-block" : "none";
  }
  function showStatus(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `status ${type}`; el.textContent = msg; el.style.display = "block";
  }
  function hideStatus(id) { document.getElementById(id).style.display = "none"; }
  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
